<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DocuMine AI - QUOKKA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<link rel="stylesheet" href="/static/styles.css">

</head>

<body>

<div class="app-container">

<!-- HEADER -->
<header class="header">

<div class="logo">
<i class="ph-fill ph-stack"></i>
<h1>DocuMine AI</h1>
</div>

<div class="user-profile">
<div class="avatar">JD</div>
<span class="username">Jane Doe</span>
</div>

</header>



<!-- STATS -->
<div class="stats-container">

<div class="stat-card">

<div class="stat-icon bg-purple">
<i class="ph ph-chat-circle-dots"></i>
</div>

<div class="stat-info">
<span class="stat-label">Questions Answered</span>
<span class="stat-value" id="questions-answered">0</span>
</div>

</div>

</div>



<!-- MAIN -->
<main class="main-content">

<div class="right-panel box-card" id="chat-panel">



<!-- CHAT HEADER -->
<div class="chat-header">

<div class="bot-info">

<div class="bot-icon">
<i class="ph-fill ph-robot"></i>
</div>

<div class="bot-details">
<h3>QUOKKA Assistant</h3>
<span class="status online">Online</span>
</div>

</div>

</div>



<!-- CHAT MESSAGES -->
<div class="chat-messages" id="chat-messages">

<div class="message bot">

<div class="msg-avatar">
<i class="ph-fill ph-robot"></i>
</div>

<div class="msg-bubble">
Hello! I am QUOKKA. Ask anything from your documents.
</div>

</div>

</div>



<!-- INPUT -->
<div class="chat-input-area">

<input
type="text"
id="chat-input"
placeholder="Ask a question..."
>

<button id="send-btn" class="send-btn">
<i class="ph-fill ph-paper-plane-right"></i>
</button>

</div>



</div>

</main>

</div>

<script src="/static/script.js"></script>

</body>

</html>
