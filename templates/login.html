<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUOKKA — Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

  <!-- ── Login form ── -->
  <div class="auth-card" id="login-card">
    <div class="auth-brand">QUOKKA</div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to your account</div>

    <div id="login-alert" class="alert"></div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input id="password" type="password" placeholder="Your password" autocomplete="current-password" />
        <span class="pw-toggle" onclick="togglePw('password','pw-eye')">
          <i id="pw-eye" class="ph ph-eye"></i>
        </span>
      </div>
    </div>

    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
      Log In <span class="spinner" id="login-spinner" style="display:none;"></span>
    </button>

    <!-- shown only when account is unverified -->
    <button class="btn btn-ghost" id="verify-instead-btn" style="display:none;" onclick="showOTPPanel()">
      Verify my email instead
    </button>

    <div class="auth-links">
      <a href="/forgot-password">Forgot password?</a>
      <a href="/signup">Don't have an account? <strong>Sign up</strong></a>
    </div>
  </div>

  <!-- ── OTP panel (for unverified users) ── -->
  <div class="auth-card" id="otp-card" style="display:none;">
    <div class="auth-brand">QUOKKA</div>
    <div class="auth-title">Verify your email</div>
    <div class="auth-sub">Enter the 6-digit code we just sent you.</div>

    <div id="otp-alert" class="alert"></div>

    <div class="otp-row" id="otp-inputs">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
    </div>

    <button class="btn btn-primary" id="verify-btn" onclick="doVerify()">
      Verify <span class="spinner" id="verify-spinner" style="display:none;"></span>
    </button>

    <div class="resend-row">
      Didn't receive it?
      <button id="resend-btn" onclick="doResend()">Resend OTP</button>
    </div>

    <button class="btn btn-ghost" onclick="backToLogin()" style="margin-top:14px;">
      ← Back to login
    </button>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    setupOTP('otp-inputs');

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      clearAlert('login-alert');
      const email    = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      setLoading('login-btn', 'login-spinner', true);
      document.getElementById('verify-instead-btn').style.display = 'none';
      const { ok, json } = await postJson('/api/auth/login', { email, password });
      setLoading('login-btn', 'login-spinner', false);

      if (ok && json.success) { window.location.href = '/'; return; }

      if (json && json.error === 'not_verified') {
        showError('login-alert', json.message || 'Please verify your email first.');
        document.getElementById('verify-instead-btn').style.display = 'block';
        return;
      }
      showError('login-alert', (json && json.message) || 'Invalid email or password.');
    }

    async function showOTPPanel() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      // Send a fresh OTP
      const { ok, json } = await postJson('/api/auth/resend-otp', { email });
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('otp-card').style.display   = 'block';
      if (ok && json.success) {
        showSuccess('otp-alert', 'A new OTP has been sent to your email.');
      }
      startCountdown('resend-btn', 60);
      document.querySelector('#otp-inputs input[data-otp]').focus();
    }

    async function doVerify() {
      clearAlert('otp-alert');
      const email = document.getElementById('email').value.trim().toLowerCase();
      const otp   = getOTP('otp-inputs');
      if (otp.length < 6) { showError('otp-alert', 'Please enter the full 6-digit code.'); return; }

      setLoading('verify-btn', 'verify-spinner', true);
      const { ok, json } = await postJson('/api/auth/verify-otp', { email, otp });
      setLoading('verify-btn', 'verify-spinner', false);

      if (ok && json.success) { window.location.href = '/'; return; }
      showError('otp-alert', (json && json.message) || 'Verification failed.');
    }

    async function doResend() {
      clearAlert('otp-alert');
      const email = document.getElementById('email').value.trim().toLowerCase();
      const { ok, json } = await postJson('/api/auth/resend-otp', { email });
      if (ok && json.success) {
        showSuccess('otp-alert', 'New OTP sent.');
        startCountdown('resend-btn', 60);
      } else {
        showError('otp-alert', (json && json.message) || 'Failed to resend OTP.');
      }
    }

    function backToLogin() {
      document.getElementById('otp-card').style.display   = 'none';
      document.getElementById('login-card').style.display = 'block';
    }
  </script>
</body>
</html>
