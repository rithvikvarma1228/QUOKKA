<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUOKKA — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

  <div class="auth-card">
    <div class="auth-brand">QUOKKA</div>
    <div class="auth-title">Set new password</div>
    <div class="auth-sub">Choose a strong password for your account.</div>

    <div id="rp-alert" class="alert"></div>

    <div id="rp-form">
      <div class="field">
        <label for="password">New password</label>
        <div class="pw-wrap">
          <input id="password" type="password" placeholder="Min 8 chars, 1 number" autocomplete="new-password" />
          <span class="pw-toggle" onclick="togglePw('password','pw-eye1')">
            <i id="pw-eye1" class="ph ph-eye"></i>
          </span>
        </div>
        <div class="strength-bar"><div id="strength-fill" class="strength-fill"></div></div>
        <div id="strength-text" class="strength-text"></div>
      </div>

      <div class="field">
        <label for="confirm">Confirm password</label>
        <div class="pw-wrap">
          <input id="confirm" type="password" placeholder="Repeat password" autocomplete="new-password" />
          <span class="pw-toggle" onclick="togglePw('confirm','pw-eye2')">
            <i id="pw-eye2" class="ph ph-eye"></i>
          </span>
        </div>
      </div>

      <button class="btn btn-primary" id="reset-btn" onclick="doReset()">
        Reset Password <span class="spinner" id="reset-spinner" style="display:none;"></span>
      </button>
    </div>

    <div id="rp-done" style="display:none;">
      <div id="rp-done-alert" class="alert success">
        Password reset successfully! Redirecting to login…
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    // Extract token from URL
    const token = new URLSearchParams(window.location.search).get('token') || '';
    if (!token) {
      showError('rp-alert', 'Invalid or missing reset link. Please request a new one.');
      document.getElementById('rp-form').style.display = 'none';
    }

    document.getElementById('password').addEventListener('input', e => {
      updateStrength(e.target.value, 'strength-fill', 'strength-text');
    });
    document.getElementById('confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset();
    });

    async function doReset() {
      clearAlert('rp-alert');
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) { showError('rp-alert', 'Passwords do not match.'); return; }

      setLoading('reset-btn', 'reset-spinner', true);
      const { ok, json } = await postJson('/api/auth/reset-password', { token, password });
      setLoading('reset-btn', 'reset-spinner', false);

      if (ok && json.success) {
        document.getElementById('rp-form').style.display = 'none';
        document.getElementById('rp-done').style.display = 'block';
        setTimeout(() => window.location.href = '/login', 2500);
        return;
      }
      showError('rp-alert', (json && json.message) || 'Reset failed. The link may have expired.');
    }
  </script>
</body>
</html>
