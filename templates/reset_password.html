<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUOKKA — Reset password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-card" style="max-width:420px;">
      <div class="auth-brand">QUOKKA</div>
      <p class="auth-subtitle">Choose a new password</p>

      <div class="error" id="rp-error"></div>
      <div class="success" id="rp-success"></div>

      <div id="rp-form">
        <div class="field">
          <label class="label" for="password">New password</label>
          <div class="pw-wrap">
            <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="new-password" />
            <span class="pw-toggle" onclick="togglePasswordVisibility('password','pw-eye')">
              <i id="pw-eye" class="ph ph-eye"></i>
            </span>
          </div>
          <div class="strength"><div id="strength-bar"></div></div>
          <div class="strength-label">Strength: <span id="strength-label">Weak</span></div>
        </div>

        <div class="field">
          <label class="label" for="confirm">Confirm password</label>
          <div class="pw-wrap">
            <input class="input" id="confirm" type="password" placeholder="••••••••" autocomplete="new-password" />
            <span class="pw-toggle" onclick="togglePasswordVisibility('confirm','pw-eye-2')">
              <i id="pw-eye-2" class="ph ph-eye"></i>
            </span>
          </div>
        </div>

        <button class="btn btn-primary" id="reset-btn">
          Reset Password <span class="spinner" id="reset-spinner" style="display:none;"></span>
        </button>
      </div>

      <div class="links" style="justify-content:center;">
        <a class="link" href="/login">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = (params.get("token") || "").trim();

    const form = document.getElementById("rp-form");
    const resetBtn = document.getElementById("reset-btn");
    const spinner = document.getElementById("reset-spinner");
    const passwordEl = document.getElementById("password");
    const confirmEl = document.getElementById("confirm");

    passwordEl.addEventListener("input", () => {
      updateStrengthBar(passwordEl.value, "strength-bar", "strength-label");
    });

    if (!token) {
      form.style.display = "none";
      showError("rp-error", "Invalid reset link");
    }

    async function submit() {
      hideError("rp-error");
      hideError("rp-success");

      if (!token) {
        showError("rp-error", "Invalid reset link");
        return;
      }

      const password = passwordEl.value || "";
      const confirm = confirmEl.value || "";
      if (password !== confirm) {
        showError("rp-error", "Passwords do not match.");
        return;
      }

      resetBtn.disabled = true;
      spinner.style.display = "inline-block";
      const { ok, json } = await postJson("/api/auth/reset-password", { token, password });
      spinner.style.display = "none";
      resetBtn.disabled = false;

      if (ok && json.success) {
        showSuccess("rp-success", "Password reset successful. Redirecting to login...");
        form.style.display = "none";
        setTimeout(() => window.location.href = "/login", 2000);
        return;
      }

      showError("rp-error", (json && json.message) || "Failed to reset password");
    }

    resetBtn.addEventListener("click", submit);
    confirmEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submit();
    });
  </script>
</body>
</html>
