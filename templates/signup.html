<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUOKKA — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

  <!-- ── Registration form ── -->
  <div class="auth-card" id="reg-card">
    <div class="auth-brand">QUOKKA</div>
    <div class="auth-title">Create account</div>
    <div class="auth-sub">Join QUOKKA AI — free forever</div>

    <div id="reg-alert" class="alert"></div>

    <div class="field">
      <label for="name">Full name</label>
      <input id="name" type="text" placeholder="Your name" autocomplete="name" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input id="password" type="password" placeholder="Min 8 chars, 1 number" autocomplete="new-password" />
        <span class="pw-toggle" onclick="togglePw('password','pw-eye1')">
          <i id="pw-eye1" class="ph ph-eye"></i>
        </span>
      </div>
      <div class="strength-bar"><div id="strength-fill" class="strength-fill"></div></div>
      <div id="strength-text" class="strength-text"></div>
    </div>

    <div class="field">
      <label for="confirm">Confirm password</label>
      <div class="pw-wrap">
        <input id="confirm" type="password" placeholder="Repeat password" autocomplete="new-password" />
        <span class="pw-toggle" onclick="togglePw('confirm','pw-eye2')">
          <i id="pw-eye2" class="ph ph-eye"></i>
        </span>
      </div>
    </div>

    <button class="btn btn-primary" id="reg-btn" onclick="doRegister()">
      Create Account <span class="spinner" id="reg-spinner" style="display:none;"></span>
    </button>

    <div class="auth-links">
      <a href="/login">Already have an account? <strong>Log in</strong></a>
    </div>
  </div>

  <!-- ── OTP verification panel ── -->
  <div class="auth-card" id="otp-card" style="display:none;">
    <div class="auth-brand">QUOKKA</div>
    <div class="auth-title">Check your inbox</div>
    <div class="auth-sub" id="otp-sub">Enter the 6-digit code we sent to your email.</div>

    <div id="otp-alert" class="alert"></div>

    <div class="otp-row" id="otp-inputs">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-otp />
    </div>

    <button class="btn btn-primary" id="verify-btn" onclick="doVerify()">
      Verify Email <span class="spinner" id="verify-spinner" style="display:none;"></span>
    </button>

    <div class="resend-row">
      Didn't receive it?
      <button id="resend-btn" onclick="doResend()">Resend OTP</button>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    setupOTP('otp-inputs');

    document.getElementById('password').addEventListener('input', e => {
      updateStrength(e.target.value, 'strength-fill', 'strength-text');
    });

    document.getElementById('confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') doRegister();
    });

    async function doRegister() {
      clearAlert('reg-alert');
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) { showError('reg-alert', 'Passwords do not match.'); return; }

      setLoading('reg-btn', 'reg-spinner', true);
      const { ok, json } = await postJson('/api/auth/register', { name, email, password });
      setLoading('reg-btn', 'reg-spinner', false);

      if (ok && json.success) {
        document.getElementById('reg-card').style.display  = 'none';
        document.getElementById('otp-card').style.display  = 'block';
        document.getElementById('otp-sub').textContent = `We sent a 6-digit code to ${email}`;
        startCountdown('resend-btn', 60);
        document.querySelector('#otp-inputs input[data-otp]').focus();
        return;
      }
      showError('reg-alert', (json && json.message) || 'Registration failed.');
    }

    async function doVerify() {
      clearAlert('otp-alert');
      const email = document.getElementById('email').value.trim().toLowerCase();
      const otp   = getOTP('otp-inputs');
      if (otp.length < 6) { showError('otp-alert', 'Please enter the full 6-digit code.'); return; }

      setLoading('verify-btn', 'verify-spinner', true);
      const { ok, json } = await postJson('/api/auth/verify-otp', { email, otp });
      setLoading('verify-btn', 'verify-spinner', false);

      if (ok && json.success) { window.location.href = '/'; return; }
      showError('otp-alert', (json && json.message) || 'Verification failed.');
    }

    async function doResend() {
      clearAlert('otp-alert');
      const email = document.getElementById('email').value.trim().toLowerCase();
      const { ok, json } = await postJson('/api/auth/resend-otp', { email });
      if (ok && json.success) {
        showSuccess('otp-alert', 'New OTP sent — check your inbox.');
        startCountdown('resend-btn', 60);
      } else {
        showError('otp-alert', (json && json.message) || 'Failed to resend OTP.');
      }
    }
  </script>
</body>
</html>
