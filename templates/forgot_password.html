<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUOKKA — Forgot password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-card" style="max-width:400px;">
      <div class="auth-brand">QUOKKA</div>
      <p class="auth-subtitle">Reset your password</p>

      <div class="error" id="fp-error"></div>
      <div class="success" id="fp-success"></div>

      <div id="fp-form">
        <div class="field">
          <label class="label" for="email">Email</label>
          <input class="input" id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <button class="btn btn-primary" id="send-btn">
          Send Reset Link <span class="spinner" id="send-spinner" style="display:none;"></span>
        </button>

        <div class="links">
          <a class="link" href="/login">Back to Login</a>
        </div>
      </div>

      <div id="fp-done" style="display:none;">
        <div class="success" style="display:block;">
          Reset link sent! Check your inbox.
        </div>
        <div class="links" style="justify-content:center;">
          <a class="link" href="/login">Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    const emailEl = document.getElementById("email");
    const sendBtn = document.getElementById("send-btn");
    const spinner = document.getElementById("send-spinner");

    async function submit() {
      hideError("fp-error");
      hideError("fp-success");
      const email = (emailEl.value || "").trim();

      sendBtn.disabled = true;
      spinner.style.display = "inline-block";
      const { ok, json } = await postJson("/api/auth/forgot-password", { email });
      spinner.style.display = "none";
      sendBtn.disabled = false;

      if (ok && json.success) {
        document.getElementById("fp-form").style.display = "none";
        document.getElementById("fp-done").style.display = "block";
        return;
      }
      showError("fp-error", (json && json.message) || "Please enter a valid email.");
    }

    sendBtn.addEventListener("click", submit);
    emailEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submit();
    });
  </script>
</body>
</html>
