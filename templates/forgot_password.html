<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUOKKA — Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

  <div class="auth-card">
    <div class="auth-brand">QUOKKA</div>
    <div class="auth-title">Forgot password?</div>
    <div class="auth-sub">Enter your email and we'll send a reset link.</div>

    <div id="fp-alert" class="alert"></div>

    <div id="fp-form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <button class="btn btn-primary" id="send-btn" onclick="doSend()">
        Send Reset Link <span class="spinner" id="send-spinner" style="display:none;"></span>
      </button>

      <div class="auth-links">
        <a href="/login">← Back to login</a>
      </div>
    </div>

    <div id="fp-done" style="display:none;">
      <div class="auth-sub" style="margin-bottom:0;">
        ✅ If that email is registered, you'll receive a reset link within a minute.
        Check your inbox (and spam folder).
      </div>
      <div class="auth-links" style="margin-top:20px;">
        <a href="/login">← Back to login</a>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSend();
    });

    async function doSend() {
      clearAlert('fp-alert');
      const email = document.getElementById('email').value.trim().toLowerCase();
      if (!email) { showError('fp-alert', 'Please enter your email address.'); return; }

      setLoading('send-btn', 'send-spinner', true);
      const { ok, json } = await postJson('/api/auth/forgot-password', { email });
      setLoading('send-btn', 'send-spinner', false);

      if (ok && json.success) {
        document.getElementById('fp-form').style.display = 'none';
        document.getElementById('fp-done').style.display = 'block';
        return;
      }
      showError('fp-alert', (json && json.message) || 'Something went wrong. Please try again.');
    }
  </script>
</body>
</html>
